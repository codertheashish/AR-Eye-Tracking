<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Eye Tracking AR</title>
    
    <!-- MediaPipe Face Mesh CDN (version-pinned to avoid 404s on internal wasm/data files) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils@0.6.1629159505/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-color: #050510;
            --text-color: #ffffff;
            --glass-bg: rgba(20, 25, 40, 0.4);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-blur: blur(16px);
            --accent: #00ffcc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .video-container {
            position: absolute;
            width: 100vw;
            height: 100vh;
        }

        .input_video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 0;
            filter: brightness(0.6) contrast(1.1);
        }

        #bgCanvas, #mainCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        
        #bgCanvas {
            z-index: 1;
            pointer-events: none;
        }

        #mainCanvas {
            z-index: 5;
            pointer-events: none;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
        }

        .panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            min-width: 180px;
        }
        .stat:last-child { margin-bottom: 0; }
        .stat span.val { font-weight: bold; color: var(--accent); }

        #themes {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 8px;
            transition: opacity 0.5s;
        }

        .theme-btn {
            background: transparent;
            border: 1px solid transparent;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s ease;
            font-weight: 500;
        }
        
        .theme-btn.active {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
            text-shadow: 0 0 10px white;
        }

        #startOverlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: opacity 0.5s ease;
        }

        .start-btn {
            padding: 16px 40px;
            font-size: 1.2rem;
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            border: none;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 204, 0.5);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: transform 0.2s;
        }
        .start-btn:hover { transform: scale(1.05); }

        .hidden { opacity: 0; pointer-events: none; }

        #loadingMsg {
            margin-top: 20px;
            color: #888;
            font-size: 0.85rem;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div id="startOverlay">
        <h1 style="margin-bottom: 20px; font-weight: 300; letter-spacing: 4px;">AI CONNECT</h1>
        <p style="margin-bottom: 40px; color: #888;">Grant camera permissions and click to start audio/visual experience</p>
        <button class="start-btn" id="startBtn">Dive In</button>
        <p id="loadingMsg"></p>
    </div>

    <div class="video-container">
        <video class="input_video" autoplay playsinline></video>
        <canvas id="bgCanvas"></canvas>
        <canvas id="mainCanvas"></canvas>
    </div>

    <div id="hud" class="hidden">
        <div class="panel">
            <div class="stat">Face Detected: <span class="val" id="ui-face">No</span></div>
            <div class="stat">FPS: <span class="val" id="ui-fps">0</span></div>
        </div>
    </div>

    <div id="themes" class="hidden">
        <button class="theme-btn active" data-theme="Rainbow">Rainbow</button>
        <button class="theme-btn" data-theme="Cyberpunk">Cyberpunk</button>
        <button class="theme-btn" data-theme="Lava">Lava</button>
        <button class="theme-btn" data-theme="Ocean">Ocean</button>
        <button class="theme-btn" data-theme="Galaxy">Galaxy</button>
    </div>

<script>
/** 
 * GLOBALS & CONFIG
 */
const videoElement = document.querySelector('.input_video');
const bgCanvas = document.getElementById('bgCanvas');
const mainCanvas = document.getElementById('mainCanvas');
const bgCtx = bgCanvas.getContext('2d');
const ctx = mainCanvas.getContext('2d');

let width = window.innerWidth;
let height = window.innerHeight;

let time = 0;
let lastTime = performance.now();
let framesThisSecond = 0;
let lastFpsTime = performance.now();

// Face / Eye tracking state
let currentFace = null;
let faceVelocity = 0; // used to drive the matrix-rain background speed
let prevNose = null;
const loadingMsg = document.getElementById('loadingMsg');

// Eye landmark indices (MediaPipe Face Mesh - 468 point model, refineLandmarks=true)
const LEFT_IRIS = 468;
const RIGHT_IRIS = 473;
const LEFT_EYE_TOP = 159, LEFT_EYE_BOTTOM = 145;
const RIGHT_EYE_TOP = 386, RIGHT_EYE_BOTTOM = 374;
const LEFT_EYE_OUTER = 33, LEFT_EYE_INNER = 133;
const RIGHT_EYE_OUTER = 263, RIGHT_EYE_INNER = 362;

// Theme Config
let currentTheme = 'Rainbow';
const themes = {
    'Rainbow':   (t, index, total) => `hsl(${(t * 100 + index * (360/total)) % 360}, 100%, 60%)`,
    'Cyberpunk': (t, index, total) => (index % 2 === 0) ? '#ff003c' : '#00f0ff',
    'Lava':      (t, index, total) => `hsl(${(10 + (index * 10)) % 40}, 100%, ${50 + Math.sin(t)*10}%)`,
    'Ocean':     (t, index, total) => `hsl(${180 + (index * 20)}, 100%, 60%)`,
    'Galaxy':    (t, index, total) => `hsl(${260 + Math.sin(t*2 + index)*40}, 100%, 65%)`
};

// Physics Engines Data
let particles = [];

// Matrix Background
let matrixColumns = [];
const fontSize = 16;
let maxColumns = 0;

// Audio Node References
let audioCtx = null;
let humOsc = null;
let humGain = null;

// UI Elements
const uiFace = document.getElementById('ui-face');
const uiFps = document.getElementById('ui-fps');

/**
 * INITIALIZATION
 */
function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    bgCanvas.width = width;
    bgCanvas.height = height;
    mainCanvas.width = width;
    mainCanvas.height = height;
    
    maxColumns = Math.floor(width / fontSize);
    matrixColumns = new Array(maxColumns).fill(1).map(() => Math.random() * height/fontSize);
}
window.addEventListener('resize', resize);
resize();

document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentTheme = e.target.getAttribute('data-theme');
        document.documentElement.style.setProperty('--accent', themes[currentTheme](0, 1, 1));
    });
});

document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('startBtn').disabled = true;
    loadingMsg.innerText = 'Starting camera...';
    initAudio();
    initMediaPipe();
});


/**
 * AUDIO ENGINE
 */
function initAudio() {
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        humOsc = audioCtx.createOscillator();
        humGain = audioCtx.createGain();
        
        humOsc.type = 'sine';
        humOsc.frequency.value = 100;
        
        humGain.gain.value = 0;
        
        humOsc.connect(humGain);
        humGain.connect(audioCtx.destination);
        humOsc.start();
    } catch(e) {
        console.error("Web Audio API failed", e);
    }
}

function updateHum(faceDetected, intensity) {
    if (!audioCtx || !humGain) return;
    if (!faceDetected) {
        humGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
        return;
    }

    const targetFreq = 100 + intensity * 250;
    const targetVolume = 0.05 + intensity * 0.15;

    humOsc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
    humGain.gain.setTargetAtTime(targetVolume, audioCtx.currentTime, 0.1);
}

/**
 * MATH & STATE LOGIC
 */
function getDist(p1, p2) {
    return Math.hypot(p1.x - p2.x, p1.y - p2.y);
}

function mapToCanvas(point) {
    return { x: point.x * width, y: point.y * height };
}

/**
 * EFFECTS & PHYSICS
 */
function createParticles(pos, color, count = 3) {
    for (let i=0; i<count; i++) {
        particles.push({
            x: pos.x,
            y: pos.y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            life: 1.0,
            color: color,
            size: Math.random() * 3 + 1
        });
    }
}

function drawBackground() {
    bgCtx.globalCompositeOperation = 'destination-out';
    bgCtx.fillStyle = `rgba(0, 0, 0, ${0.15 + Math.min(faceVelocity*10, 0.5)})`;
    bgCtx.fillRect(0, 0, width, height);
    bgCtx.globalCompositeOperation = 'source-over';

    bgCtx.fillStyle = themes[currentTheme](time, 1, 1);
    bgCtx.font = fontSize + "px monospace";
    
    let speedMult = 1 + (faceVelocity * 100);

    for (let i = 0; i < matrixColumns.length; i++) {
        if (Math.random() > 0.95) {
            const char = String.fromCharCode(0x30A0 + Math.random() * 96);
            bgCtx.fillText(char, i * fontSize, matrixColumns[i] * fontSize);
        }
        
        matrixColumns[i] += Math.random() * speedMult;
        
        if (matrixColumns[i] * fontSize > height && Math.random() > 0.9) {
            matrixColumns[i] = 0;
        }
    }
}

function updatePhysics() {
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;
        p.vy += 0.1;
        
        if (p.life <= 0) {
            particles.splice(i, 1);
        } else {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.fill();
        }
    }
    ctx.globalAlpha = 1.0;
}

/**
 * EYE LASER / GLOW EFFECT
 * Draws a glowing beam shooting outward from each eye, anchored at the iris,
 * pointing in the direction the face is actually turned (up/down/left/right/forward).
 * Both eyes shoot perfectly parallel beams.
 */

// Landmarks used to estimate head pose
const NOSE_TIP = 1;
const FOREHEAD = 10;
const CHIN = 152;
const FACE_LEFT = 234;
const FACE_RIGHT = 454;

function getEyeOpenness(face, topIdx, bottomIdx, outerIdx, innerIdx) {
    const top = face[topIdx];
    const bottom = face[bottomIdx];
    const outer = face[outerIdx];
    const inner = face[innerIdx];
    const vertical = getDist(top, bottom);
    const horizontal = getDist(outer, inner) || 0.0001;
    return vertical / horizontal; // bigger = more open
}

// Estimate a 2D "facing direction" unit vector from head landmarks (yaw + pitch).
function getHeadFacingDir(face) {
    const nose = mapToCanvas(face[NOSE_TIP]);
    const forehead = mapToCanvas(face[FOREHEAD]);
    const chin = mapToCanvas(face[CHIN]);
    const faceL = mapToCanvas(face[FACE_LEFT]);
    const faceR = mapToCanvas(face[FACE_RIGHT]);

    const cx = (faceL.x + faceR.x) / 2;
    const cy = (forehead.y + chin.y) / 2;

    const faceWidth = Math.hypot(faceR.x - faceL.x, faceR.y - faceL.y) || 1;
    const yaw = ((nose.x - cx) / faceWidth) * 2.6;

    const faceHeight = Math.hypot(chin.x - forehead.x, chin.y - forehead.y) || 1;
    const pitch = ((nose.y - cy) / faceHeight) * 2.6;

    return { x: yaw, y: pitch };
}

function drawEyeLaser(eyeCenterPoint, headFacingDir, color, openness) {
    const origin = mapToCanvas(eyeCenterPoint);

    const intensity = Math.max(0, Math.min(1, (openness - 0.12) / 0.22));
    if (intensity <= 0.02) return;

    // Both eyes shoot in the exact same direction so the beams stay parallel.
    let dx = headFacingDir.x;
    let dy = headFacingDir.y;
    let len = Math.hypot(dx, dy) || 1;
    dx /= len; dy /= len;

    const beamLength = 320 * intensity;
    const tip = {
        x: origin.x + dx * beamLength,
        y: origin.y + dy * beamLength
    };

    ctx.save();
    ctx.globalCompositeOperation = 'screen';

    const grad = ctx.createLinearGradient(origin.x, origin.y, tip.x, tip.y);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.25, color);
    grad.addColorStop(1, 'rgba(255,255,255,0)');

    // Wide outer glow (bloom)
    ctx.beginPath();
    ctx.moveTo(origin.x, origin.y);
    ctx.lineTo(tip.x, tip.y);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 22 * intensity;
    ctx.shadowBlur = 50;
    ctx.shadowColor = color;
    ctx.globalAlpha = 0.55 * intensity;
    ctx.stroke();

    // Mid glow
    ctx.beginPath();
    ctx.moveTo(origin.x, origin.y);
    ctx.lineTo(tip.x, tip.y);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 10 * intensity;
    ctx.shadowBlur = 35;
    ctx.shadowColor = color;
    ctx.globalAlpha = 0.8 * intensity;
    ctx.stroke();

    // Bright white-hot core beam
    ctx.beginPath();
    ctx.moveTo(origin.x, origin.y);
    ctx.lineTo(tip.x, tip.y);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 3.5 * intensity;
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#ffffff';
    ctx.globalAlpha = intensity;
    ctx.stroke();

    // Glowing eye socket / iris point
    ctx.beginPath();
    ctx.arc(origin.x, origin.y, 9 * intensity + 3, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.shadowBlur = 40;
    ctx.shadowColor = color;
    ctx.globalAlpha = intensity;
    ctx.fill();

    // Extra colored halo around the eye point
    ctx.beginPath();
    ctx.arc(origin.x, origin.y, 16 * intensity + 4, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.shadowBlur = 30;
    ctx.shadowColor = color;
    ctx.globalAlpha = 0.35 * intensity;
    ctx.fill();

    ctx.restore();
    ctx.globalAlpha = 1.0;

    if (Math.random() > 0.55) {
        createParticles(tip, color, 2);
    }
}

function drawFaceEyeEffects() {
    if (!currentFace) return;

    const hasIris = currentFace.length > RIGHT_IRIS;

    const leftCenterLandmark = hasIris ? currentFace[LEFT_IRIS] : {
        x: (currentFace[LEFT_EYE_OUTER].x + currentFace[LEFT_EYE_INNER].x) / 2,
        y: (currentFace[LEFT_EYE_OUTER].y + currentFace[LEFT_EYE_INNER].y) / 2
    };
    const rightCenterLandmark = hasIris ? currentFace[RIGHT_IRIS] : {
        x: (currentFace[RIGHT_EYE_OUTER].x + currentFace[RIGHT_EYE_INNER].x) / 2,
        y: (currentFace[RIGHT_EYE_OUTER].y + currentFace[RIGHT_EYE_INNER].y) / 2
    };

    const headDir = getHeadFacingDir(currentFace);

    const leftOpen = getEyeOpenness(currentFace, LEFT_EYE_TOP, LEFT_EYE_BOTTOM, LEFT_EYE_OUTER, LEFT_EYE_INNER);
    const rightOpen = getEyeOpenness(currentFace, RIGHT_EYE_TOP, RIGHT_EYE_BOTTOM, RIGHT_EYE_OUTER, RIGHT_EYE_INNER);

    const leftColor = themes[currentTheme](time, 0, 2);
    const rightColor = themes[currentTheme](time, 1, 2);

    drawEyeLaser(leftCenterLandmark, headDir, leftColor, leftOpen);
    drawEyeLaser(rightCenterLandmark, headDir, rightColor, rightOpen);
}

/**
 * MAIN RENDER PIPELINE
 */
function renderLoop(timestamp) {
    requestAnimationFrame(renderLoop);
    
    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    time += dt;

    framesThisSecond++;
    if (timestamp > lastFpsTime + 1000) {
        uiFps.innerText = framesThisSecond;
        framesThisSecond = 0;
        lastFpsTime = timestamp;
    }

    drawBackground();

    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.fillRect(0, 0, width, height);

    ctx.globalCompositeOperation = 'screen';

    updatePhysics();

    if (currentFace) {
        uiFace.innerText = "Yes";

        // Track velocity using nose-tip movement (drives matrix-rain speed + hum)
        const nose = currentFace[NOSE_TIP];
        if (prevNose) {
            faceVelocity = getDist(prevNose, nose);
        } else {
            faceVelocity = 0;
        }
        prevNose = { x: nose.x, y: nose.y };

        drawFaceEyeEffects();
        updateHum(true, Math.min(faceVelocity * 20, 1));
    } else {
        uiFace.innerText = "No";
        faceVelocity = 0;
        prevNose = null;
        updateHum(false, 0);
    }
    
    ctx.globalCompositeOperation = 'source-over';
}

/**
 * MEDIAPIPE INITIALIZATION (Face Mesh only)
 */
function initMediaPipe() {
    let cameraStarted = false;

    function tryStartCamera() {
        if (cameraStarted) return;
        cameraStarted = true;

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({image: videoElement});
            },
            width: 1280,
            height: 720,
            facingMode: 'user'
        });

        camera.start().then(() => {
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('themes').classList.remove('hidden');
            requestAnimationFrame(renderLoop);
        }).catch((err) => {
            console.error("Camera start failed", err);
            loadingMsg.innerText = 'Camera access denied or unavailable. Please allow camera permissions and reload.';
            document.getElementById('startBtn').disabled = false;
            cameraStarted = false;
        });
    }

    // --- Face Mesh (for eye light effect) ---
    const faceMesh = new FaceMesh({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${file}`;
    }});

    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true, // needed for iris points (468 & 473)
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
    });

    faceMesh.onResults((results) => {
        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            currentFace = results.multiFaceLandmarks[0];
        } else {
            currentFace = null;
        }
    });

    faceMesh.initialize()
        .then(() => {
            tryStartCamera();
        })
        .catch((e) => {
            console.error("MediaPipe init failed", e);
            loadingMsg.innerText = 'Failed to load face tracking. Check your internet connection and reload.';
            document.getElementById('startBtn').disabled = false;
        });
}

</script>
</body>
</html>
